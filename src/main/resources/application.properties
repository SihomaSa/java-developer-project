# ===================================
# CONFIGURACIÓN PRINCIPAL
# ===================================
spring.application.name=java-developer-project
server.port=8080

# ===================================
# BASE DE DATOS (H2 para desarrollo)
# ===================================
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (solo dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Detectar problemas N+1
spring.jpa.properties.hibernate.generate_statistics=false

# ===================================
# RABBITMQ
# ===================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Reintentos de conexión
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.max-attempts=3

# ===================================
# SWAGGER / OPENAPI
# ===================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===================================
# ACTUATOR (DevOps / Health checks CI/CD)
# ===================================
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

info.app.name=Java Developer Project
info.app.version=1.0.0
info.app.description=Proyecto demostrativo de buenas practicas Java

# ===================================
# LOGGING
# ===================================
logging.level.com.empresa.app=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
