name: CI/CD Pipeline - Java Developer Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ===== JOB 1: BUILD & TEST (Backend + Frontend) =====
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend (React)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Copiar frontend a static (para que se incluya en el JAR)
        run: cp -r frontend/dist/* src/main/resources/static/

      - name: Compilar backend y ejecutar tests con cobertura
        run: mvn clean test jacoco:report -B
        env:
          SPRING_RABBITMQ_HOST: localhost

      - name: Verificar cobertura mínima (80%)
        run: mvn jacoco:check -B

      - name: Publicar reporte de cobertura (Codecov)
        uses: codecov/codecov-action@v5
        with:
          file: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Subir reporte JaCoCo como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ===== JOB 2: CODE QUALITY (Checkstyle) =====
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Análisis estático (Checkstyle)
        run: mvn checkstyle:check -B
        # El pipeline fallará si hay errores de estilo (quitamos el "|| true")

  # ===== JOB 3: BUILD DOCKER IMAGE (solo en main) =====
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Copiar frontend para incluirlo en la imagen
        run: cp -r frontend/dist/* src/main/resources/static/

      - name: Empaquetar JAR
        run: mvn package -DskipTests -B

      - name: Log in a Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:${{ github.sha }} .

      - name: Publicar imagen a Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:latest

  # ===== JOB 4: DEPLOY (producción) =====
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Desplegar vía SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:latest
            docker stop java-developer-project || true
            docker rm java-developer-project || true
            docker run -d \
              --name java-developer-project \
              -p 8080:8080 \
              --env-file /etc/java-developer-project/.env \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/java-developer-project:latest
            echo "✅ Despliegue completado"
